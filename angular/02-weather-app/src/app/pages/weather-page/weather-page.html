<div class="container">
  <h1>Weather App</h1>
  <app-weather-form (cityToSearch)="onCitySearch($event)" />

  @if (isLoading()) {
    <div class="spinner"></div>
  }
  @if (errorMessage()) {
    <p>{{ errorMessage() }}</p>
  }

  <app-weather-card [weather]="weatherResponse()" />

  <app-weather-forecast [forecast]="dailyForecast()" />
</div>
