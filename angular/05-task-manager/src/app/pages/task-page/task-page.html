<div class="container">
  <header class="task-header">
    <div>
      <h1>Task Manager</h1>
      <p class="subtitle">Manage and track your team's tasks</p>
    </div>

    <button matButton="filled" (click)="openDialog()">Add Task</button>
  </header>

  <div class="stats-row">
    <div
      class="stat-card"
      [class.active]="selectedStatus() === 'all'"
      (click)="onCardClick('all')"
      (keydown.enter)="onCardClick('all')"
      role="button"
      tabindex="0"
    >
      <div class="stat-header">
        <mat-icon>assignment</mat-icon>
        <span class="stat-label">Total</span>
      </div>
      <span class="stat-value">{{ totalTasks() }}</span>
    </div>
    <div
      class="stat-card"
      (click)="onCardClick('pending')"
      (keydown.enter)="onCardClick('pending')"
      [class.active]="selectedStatus() === 'pending'"
      role="button"
      tabindex="0"
    >
      <div class="stat-header">
        <mat-icon>schedule</mat-icon>
        <span class="stat-label">Pending</span>
      </div>
      <span class="stat-value">{{ pendingTasks() }}</span>
    </div>
    <div
      class="stat-card"
      [class.active]="selectedStatus() === 'in-progress'"
      (click)="onCardClick('in-progress')"
      (keydown.enter)="onCardClick('in-progress')"
      role="button"
      tabindex="0"
    >
      <div class="stat-header">
        <mat-icon>autorenew</mat-icon>
        <span class="stat-label">In Progress</span>
      </div>
      <span class="stat-value">{{ inProgressTasks() }}</span>
    </div>
    <div
      class="stat-card"
      [class.active]="selectedStatus() === 'done'"
      (click)="onCardClick('done')"
      (keydown.enter)="onCardClick('done')"
      role="button"
      tabindex="0"
    >
      <div class="stat-header">
        <mat-icon>task_alt</mat-icon>
        <span class="stat-label">Done</span>
      </div>
      <span class="stat-value">{{ doneTasks() }}</span>
    </div>
  </div>

  <app-task-filters
    [selectedStatus]="selectedStatus()"
    [selectedPriority]="selectedPriority()"
    [hasActiveFilters]="hasActiveFilters()"
    [searchValue]="searchTerm()"
    (status)="onStatusChange($event)"
    (priority)="onPriorityChange($event)"
    (searchName)="onSearchName($event)"
    (clearAll)="onClearAll()"
  />

  <p class="filter-text" [class.filter-text-active]="hasActiveFilters()">
    Showing {{ filteredTasks().length }} of {{ totalTasks() }}
  </p>

  <app-task-table
    [tasks]="filteredTasks()"
    [hasTasks]="totalTasks() > 0"
    (taskId)="onDeleteTask($event)"
    (taskToEdit)="onEditTask($event)"
  />
</div>
