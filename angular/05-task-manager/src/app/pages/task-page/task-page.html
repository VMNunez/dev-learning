<div class="container">
  <header class="task-header">
    <h1>Task Manager</h1>
    <button matButton="filled" (click)="openDialog()">Add Task</button>
  </header>

  <div class="stats-row">
    <div class="stat-card" [class.active]="selectedStatus() === 'all'" (click)="onCardClick('all')">
      <div class="stat-header">
        <mat-icon>assignment</mat-icon>
        <span class="stat-label">Total</span>
      </div>
      <span class="stat-value">{{ totalTasks() }}</span>
    </div>
    <div
      class="stat-card"
      (click)="onCardClick('pending')"
      [class.active]="selectedStatus() === 'pending'"
    >
      <div class="stat-header">
        <mat-icon>schedule</mat-icon>
        <span class="stat-label">Pending</span>
      </div>
      <span class="stat-value">{{ pendingTasks() }}</span>
    </div>
    <div
      class="stat-card"
      [class.active]="selectedStatus() === 'in-progress'"
      (click)="onCardClick('in-progress')"
    >
      <div class="stat-header">
        <mat-icon>autorenew</mat-icon>
        <span class="stat-label">In Progress</span>
      </div>
      <span class="stat-value">{{ inProgressTasks() }}</span>
    </div>
    <div
      class="stat-card"
      [class.active]="selectedStatus() === 'done'"
      (click)="onCardClick('done')"
    >
      <div class="stat-header">
        <mat-icon>task_alt</mat-icon>
        <span class="stat-label">Done</span>
      </div>
      <span class="stat-value">{{ doneTasks() }}</span>
    </div>
  </div>

  <app-task-filters
    [selectedStatus]="selectedStatus()"
    (status)="onStatusChange($event)"
    (priority)="onPriorityChange($event)"
    (searchName)="onSearchName($event)"
  />

  <app-task-table
    [tasks]="filteredTasks()"
    [hasTasks]="totalTasks() > 0"
    (taskId)="onDeleteTask($event)"
    (taskToEdit)="onEditTask($event)"
  />
</div>
