<h2 mat-dialog-title>{{ data.task.name }}</h2>
<mat-dialog-content> <p>Are you sure you want to delete this task?</p></mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Cancel</button>
  <button matButton="outlined" class="btn-danger" (click)="confirmDelete()">Delete</button>
</mat-dialog-actions>
