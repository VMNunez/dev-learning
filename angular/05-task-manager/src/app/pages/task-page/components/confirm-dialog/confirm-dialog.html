<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>{{ data.cancelLabel }}</button>
  <button matButton="outlined" [class.btn-danger]="data.danger" (click)="confirm()">
    {{ data.confirmLabel }}
  </button>
</mat-dialog-actions>
