<div class="clear-btn" [class.active]="hasActiveFilters()">
  <button matButton (click)="clearFilters()">Clear All</button>
</div>
<div class="filter-container">
  <mat-form-field class="search-field" subscriptSizing="dynamic">
    <mat-label>Search by name</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input matInput (input)="searchChange($event)" [value]="searchValue()" />
  </mat-form-field>
  <mat-form-field subscriptSizing="dynamic">
    <mat-label>Status</mat-label>
    <mat-select (selectionChange)="statusChange($event.value)" [value]="selectedStatus()">
      <mat-option value="all">All</mat-option>
      <mat-option value="pending">Pending</mat-option>
      <mat-option value="in-progress">In Progress</mat-option>
      <mat-option value="done">Done</mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field subscriptSizing="dynamic">
    <mat-label>Priority</mat-label>
    <mat-select (selectionChange)="priorityChange($event.value)" [value]="selectedPriority()">
      <mat-option value="all">All</mat-option>
      <mat-option value="low">Low</mat-option>
      <mat-option value="medium">Medium</mat-option>
      <mat-option value="high">High</mat-option>
    </mat-select>
  </mat-form-field>
</div>
