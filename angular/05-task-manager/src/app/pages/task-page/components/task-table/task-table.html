<table mat-table [dataSource]="dataSource" matSort (matSortChange)="announceSortChange($event)">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by name">
      Name
    </th>
    <td mat-cell *matCellDef="let task">{{ task.name }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let task">
      <span class="badge" [ngClass]="task.status">{{ task.status }}</span>
    </td>
  </ng-container>

  <ng-container matColumnDef="priority">
    <th mat-header-cell *matHeaderCellDef>Priority</th>
    <td mat-cell *matCellDef="let task">
      <span class="badge" [ngClass]="task.priority">{{ task.priority }}</span>
    </td>
  </ng-container>

  <ng-container matColumnDef="assignee">
    <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by assignee">
      Assignee
    </th>
    <td mat-cell *matCellDef="let task">{{ task.assignee }}</td>
  </ng-container>

  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by date">
      Created At
    </th>
    <td mat-cell *matCellDef="let task">{{ task.createdAt | date }}</td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let task">
      <div class="actions">
        <button matButton="outlined" (click)="openConfirmDialog(task)" class="btn-danger">
          Delete
        </button>
        <button matButton="outlined" (click)="editTask(task)">Edit</button>
      </div>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  <tr class="no-data-row" *matNoDataRow>
    <td [attr.colspan]="displayedColumns.length">
      <div class="no-data-content">
        <mat-icon>assignment</mat-icon>
        <p>No tasks yet</p>
        <p>Add your first task to get started</p>
      </div>
    </td>
  </tr>
</table>
