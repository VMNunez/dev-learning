<h2 mat-dialog-title>{{ data.title }}</h2>

<mat-dialog-content>
  {{ data.message }}
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button matButton="text" mat-dialog-close>
    {{ data.cancelLabel }}
  </button>
  <button matButton="filled" (click)="onConfirm()">{{ data.confirmLabel }}</button>
</mat-dialog-actions>
