<table mat-table [dataSource]="datasource">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let department">{{ department.name }}</td>
  </ng-container>
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef>Description</th>
    <td mat-cell *matCellDef="let department">{{ department.description }}</td>
  </ng-container>
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let department">
      <button matButton (click)="onDelete(department.id)">Delete</button>
      <button matButton [routerLink]="['/departments/edit', department.id]">Edit</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

  <tr class="not-data-row" *matNoDataRow>
    <td [attr.colspan]="displayedColumns.length">
      <div class="not-data-content">
        <mat-icon aria-hidden="true" fontIcon="group"> </mat-icon>
        <p>No departments yet</p>
      </div>
    </td>
  </tr>
</table>

<mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page">
</mat-paginator>
