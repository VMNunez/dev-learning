<div class="container">
  <div class="department-header">
    <h1>Departments</h1>
    <button matButton="filled" routerLink="/departments/new">Add Department</button>
  </div>

  <mat-card appearance="outlined">
    <mat-card-content>
      <app-department-list [departments]="departments()" (delete)="onDelete($event)" />
    </mat-card-content>
  </mat-card>
</div>
