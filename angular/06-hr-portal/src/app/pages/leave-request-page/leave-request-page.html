<div class="container">
  <div class="leave-request-header">
    <h1>Leave Requests</h1>
    @if (role === 'admin') {
      <button matButton="filled" (click)="openDialog()">Submit leave request</button>
    }
  </div>
  @if (role === 'admin') {
    <app-leave-request-table
      [requests]="leaveRequests()"
      [role]="role"
      (statusChange)="onStatusChange($event.id, $event.status)"
    />
  } @else if (role === 'employee') {
    <app-leave-request-table [requests]="filteredLeaveRequests()" [role]="role" />
  }
</div>
