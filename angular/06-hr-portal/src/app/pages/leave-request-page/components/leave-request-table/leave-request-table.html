<table mat-table [dataSource]="datasource" matSort>
  <ng-container matColumnDef="employeeEmail">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
    <td mat-cell *matCellDef="let request">{{ request.employeeEmail }}</td>
  </ng-container>

  <ng-container matColumnDef="reason">
    <th mat-header-cell *matHeaderCellDef>Reason</th>
    <td mat-cell *matCellDef="let request">{{ request.reason }}</td>
  </ng-container>

  <ng-container matColumnDef="startDate">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Start Date</th>
    <td mat-cell *matCellDef="let request">{{ request.startDate | date: 'dd/MM/yyyy' }}</td>
  </ng-container>

  <ng-container matColumnDef="endDate">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>End Date</th>
    <td mat-cell *matCellDef="let request">{{ request.endDate | date: 'dd/MM/yyyy' }}</td>
  </ng-container>

  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let request">
      <span class="badge" [ngClass]="request.status">
        {{ request.status }}
      </span>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let request">
      @if (request.status === 'pending') {
        <button matButton (click)="onStatusChange(request.id, 'approved')">Approve</button>
        <button matButton (click)="onStatusChange(request.id, 'rejected')">Reject</button>
      } @else {
        <span class="no-actions">—</span>
      }
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayColumns()"></tr>
  <tr mat-row *matRowDef="let request; columns: displayColumns()"></tr>

  <tr class="no-data-row" *matNoDataRow>
    <td [attr.colspan]="displayColumns().length">
      <div class="not-data-content">
        <mat-icon aria-hidden="true" fontIcon="group"> </mat-icon>
        <p>No requests yet</p>
      </div>
    </td>
  </tr>
</table>

<mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page">
</mat-paginator>
