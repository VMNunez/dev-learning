<h2 mat-dialog-title>Add Leave Request</h2>

<mat-dialog-content>
  <form [formGroup]="newLeaveRequest">
    <mat-form-field appearance="outline">
      <mat-label>Start Date</mat-label>
      <input matInput [matDatepicker]="startPicker" formControlName="startDate" />
      <mat-datepicker-toggle matIconSuffix [for]="startPicker"></mat-datepicker-toggle>
      <mat-datepicker #startPicker></mat-datepicker>
      <mat-error>Start date is required</mat-error>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>End Date</mat-label>
      <input matInput [matDatepicker]="endPicker" formControlName="endDate" />
      <mat-datepicker-toggle matIconSuffix [for]="endPicker"></mat-datepicker-toggle>
      <mat-datepicker #endPicker></mat-datepicker>
      @if (newLeaveRequest.controls.endDate.hasError('required')) {
        <mat-error>End date is required</mat-error>
      } @else if (newLeaveRequest.controls.endDate.hasError('invalidDate')) {
        <mat-error>End date must be after start date </mat-error>
      }
    </mat-form-field>
    <mat-form-field class="reason-field" appearance="outline">
      <mat-label>Reason</mat-label>
      <textarea matInput formControlName="reason"></textarea>
      <mat-error>Reason is required</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions>
  <button matButton="text" mat-dialog-close>Cancel</button>
  <button matButton="filled" (click)="onSubmit()">Submit</button>
</mat-dialog-actions>
