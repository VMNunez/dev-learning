<div class="container">
  <div class="dashboard-header">
    <h1>Dashboard</h1>
    <p>Welcome back, {{ username() }}</p>
  </div>

  <div class="card-container">
    <mat-card appearance="outlined" class="stat-card" routerLink="/employees">
      <mat-card-content>
        <div class="stat-header">
          <mat-icon>group</mat-icon>
          <span class="stat-label">Total Employees</span>
        </div>
        <strong class="stat-number">{{ totalEmployees() }}</strong>
      </mat-card-content>
    </mat-card>
    <mat-card
      appearance="outlined"
      class="stat-card"
      [routerLink]="'/employees'"
      [queryParams]="{ status: 'active' }"
    >
      <mat-card-content>
        <div class="stat-header">
          <mat-icon>how_to_reg</mat-icon>
          <span class="stat-label">Active Employees</span>
        </div>
        <strong class="stat-number">{{ activeEmployees() }}</strong>
      </mat-card-content>
    </mat-card>
    <mat-card appearance="outlined" class="stat-card" routerLink="/departments">
      <mat-card-content>
        <div class="stat-header">
          <mat-icon>corporate_fare</mat-icon>
          <span class="stat-label">Total Departments</span>
        </div>
        <strong class="stat-number">{{ totalDepartments() }}</strong>
      </mat-card-content>
    </mat-card>
    <mat-card appearance="outlined" class="stat-card" routerLink="/leave-requests">
      <mat-card-content>
        <div class="stat-header">
          <mat-icon>corporate_fare</mat-icon>
          <span class="stat-label">Total Departments</span>
        </div>
        <strong class="stat-number">{{ totalDepartments() }}</strong>
      </mat-card-content>
    </mat-card>
  </div>
</div>
