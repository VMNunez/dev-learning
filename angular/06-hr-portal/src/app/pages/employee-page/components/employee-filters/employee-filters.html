<div class="filters-container">
  <mat-form-field class="search-field" appearance="outline" subscriptSizing="dynamic">
    <mat-label>Search by name</mat-label>
    <input
      matInput
      #searchInput
      (input)="searchChange.emit(searchInput.value)"
      [value]="searchTerm()"
    />
  </mat-form-field>
  <mat-form-field appearance="outline" subscriptSizing="dynamic">
    <mat-label>Department</mat-label>
    <mat-select
      #selectDepartment
      (selectionChange)="departmentChange.emit(selectDepartment.value)"
      [value]="selectedDepartment()"
    >
      <mat-option value="">All</mat-option>
      @for (department of departments(); track department) {
        <mat-option [value]="department">{{ department }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
  <mat-form-field appearance="outline" subscriptSizing="dynamic">
    <mat-label>Status</mat-label>
    <mat-select
      #selectStatus
      (selectionChange)="statusChange.emit(selectStatus.value)"
      [value]="selectedStatus()"
    >
      <mat-option value="">All</mat-option>
      <mat-option value="active">Active</mat-option>
      <mat-option value="inactive">Inactive</mat-option>
    </mat-select>
  </mat-form-field>
</div>
<div class="filters-footer" [class.active]="hasActiveFilters()">
  <p>Showing {{ totalFilteredEmployees() }} of {{ totalEmployees() }}</p>

  <button matButton="text" (click)="clearFilters()">Clear Filters</button>
</div>
