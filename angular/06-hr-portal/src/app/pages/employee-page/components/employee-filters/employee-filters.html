<div class="filters-container">
  <mat-form-field class="search-field" appearance="outline">
    <mat-label>Search by name</mat-label>
    <input matInput #searchInput (input)="searchChange.emit(searchInput.value)" />
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Department</mat-label>
    <mat-select #selectDepartment (selectionChange)="departmentChange.emit(selectDepartment.value)">
      <mat-option value="">All</mat-option>
      @for (department of departments(); track department) {
        <mat-option [value]="department">{{ department }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
  <mat-form-field appearance="outline">
    <mat-label>Status</mat-label>
    <mat-select #selectStatus (selectionChange)="statusChange.emit(selectStatus.value)">
      <mat-option value="">All</mat-option>
      <mat-option value="active">Active</mat-option>
      <mat-option value="inactive">Inactive</mat-option>
    </mat-select>
  </mat-form-field>
</div>
