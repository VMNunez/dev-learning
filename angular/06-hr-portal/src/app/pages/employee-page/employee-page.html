<div class="container">
  <div class="employee-header">
    <h1>Employees</h1>
    <button matButton="filled" (click)="openDialog()">Add Employee</button>
  </div>

  <app-employee-filters
    [departments]="departments()"
    [searchTerm]="searchTerm()"
    [selectedDepartment]="selectedDepartment()"
    [selectedStatus]="selectedStatus()"
    [hasActiveFilters]="hasActiveFilters()"
    [totalEmployees]="totalEmployees()"
    [totalFilteredEmployees]="totalFilteredEmployees()"
    (searchChange)="updateSearchTerm($event)"
    (departmentChange)="updateDepartment($event)"
    (statusChange)="updateStatus($event)"
    (clearAll)="clearFilters()"
  />

  <app-employee-table
    [employees]="filteredEmployees()"
    [hasActiveFilters]="hasActiveFilters()"
    (employeeId)="onDelete($event)"
    (updatedEmployee)="onEdit($event)"
  />
</div>
