<mat-toolbar>
  <div class="toolbar-brand">
    <span class="app-title" routerLink="/dashboard">HR Portal</span>
  </div>

  @if (isLoggedIn()) {
    <button matButton (click)="logout()">Log out</button>
  }
</mat-toolbar>

<mat-sidenav-container>
  <mat-sidenav mode="side" [opened]="!!isLoggedIn()">
    <mat-nav-list role="navigation" aria-label="Main navigation">
      @for (link of filteredNavLinks(); track link.path) {
        <li>
          <a
            mat-list-item
            [routerLink]="link.path"
            routerLinkActive="active"
            #rla="routerLinkActive"
            [activated]="rla.isActive"
          >
            {{ link.label }}
          </a>
        </li>
      }
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
